<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Callera Clinic</title>

    <!-- FAVICON (logo no lugar do mundinho) -->
    <link rel="icon" type="image/png" href="../images/favicon.png" />
    <link rel="apple-touch-icon" href="../images/favicon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Cinzel:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- CSS (volta 1 pasta) -->
    <link rel="stylesheet" href="../styles.css" />
  </head>

  <body>
    <div class="wrapper">
      <header>
        <img
          src="../images/logo.png"
          alt="Logotipo Callera Clinic"
          class="logo"
        />
        <h1>Callera Clinic</h1>
        <h2>Estética Integrativa</h2>
      </header>

      <section class="icon-grid">
        <!-- PRIMEIRA LINHA -->
        <div class="icon-row row-three">
          <!-- WhatsApp -->
          <div class="icon-box">
            <a
              href="https://wa.me/5592993242367"
              target="_blank"
              rel="noopener"
            >
              <img
                src="../images/whatsapp.png"
                alt="Ícone do WhatsApp"
                class="icon"
              />
              <span class="label">Whatsapp</span>
            </a>
          </div>

          <!-- Telefone -->
          <div class="icon-box">
            <a href="tel:+5592993242367">
              <img
                src="../images/phone.png"
                alt="Ícone do Telefone"
                class="icon"
              />
              <span class="label">Telefone</span>
            </a>
          </div>

          <!-- E-mail -->
          <div class="icon-box">
            <a href="mailto:calleraclinic@gmail.com">
              <img
                src="../images/email.png"
                alt="Ícone de E-mail"
                class="icon"
              />
              <span class="label">E-mail</span>
            </a>
          </div>
        </div>

        <!-- SEGUNDA LINHA -->
        <div class="icon-row row-two">
          <!-- Instagram -->
          <div class="icon-box">
            <a
              href="https://instagram.com/calleraclinic"
              target="_blank"
              rel="noopener"
            >
              <img
                src="../images/social.png"
                alt="Ícone de rede social"
                class="icon"
              />
              <span class="label">Rede Social</span>
            </a>
          </div>

          <!-- Localização -->
          <div class="icon-box">
            <a
              href="https://www.google.com/maps/search/?api=1&query=Callera+Clinic"
              target="_blank"
              rel="noopener"
            >
              <img
                src="../images/location.png"
                alt="Ícone de localização"
                class="icon"
              />
              <span class="label">Localização</span>
            </a>
          </div>
        </div>
      </section>

      <footer>
        <img
          src="../images/hand.png"
          alt="Ícone de mão indicando toque"
          class="hand-icon"
        />
        <p>Toque nos ícones</p>
      </footer>
    </div>
  </body>
</html>
